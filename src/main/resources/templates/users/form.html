<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${user.id != null ? 'Chỉnh sửa người dùng' : 'Thêm người dùng mới'}">Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
    <style>.form-premium .form-header{background:var(--gradient-accent);}</style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-premium">
      <div class="container">
        <a class="navbar-brand" th:href="@{/}"><i class="fas fa-store"></i> ShopPro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="fas fa-home me-1"></i> Trang chủ</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/products}"><i class="fas fa-box me-1"></i> Sản phẩm</a></li>
            <li class="nav-item"><a class="nav-link active" th:href="@{/users}"><i class="fas fa-users me-1"></i> Người dùng</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="content-wrapper">
      <div class="container py-4">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb breadcrumb-premium">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item"><a th:href="@{/users}">Người dùng</a></li>
            <li class="breadcrumb-item active" th:text="${user.id != null ? 'Chỉnh sửa' : 'Thêm mới'}">Form</li>
          </ol>
        </nav>
        <div class="row justify-content-center animate-fade-in-up">
          <div class="col-md-6 col-lg-5">
            <div class="form-premium">
              <div class="form-header">
                <h4><i th:class="${user.id != null ? 'fas fa-user-pen' : 'fas fa-user-plus'}"></i> <span th:text="${user.id != null ? 'Chỉnh sửa người dùng' : 'Thêm người dùng mới'}">Form</span></h4>
              </div>
              <div class="form-body">
                <form th:action="${user.id != null ? '/users/update/' + user.id : '/users'}" th:object="${user}" method="post" novalidate>
                  <div class="mb-3">
                    <label class="form-label"><i class="fas fa-user me-1" style="color:var(--accent-500);"></i> Họ và tên <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{fullName}" 
                           th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"
                           placeholder="Nhập họ và tên" id="input-fullname" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">Lỗi họ tên</div>
                  </div>
                  <div class="mb-4">
                    <label class="form-label"><i class="fas fa-envelope me-1" style="color:var(--accent-500);"></i> Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" th:field="*{email}" 
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                           placeholder="example@email.com" id="input-email" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Lỗi email</div>
                  </div>
                  <div class="divider"></div>
                  <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/users}" class="btn-premium btn-outline-premium"><i class="fas fa-xmark"></i> Hủy</a>
                    <button type="submit" class="btn-premium btn-accent-premium"><i class="fas fa-floppy-disk"></i> Lưu</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="footer-premium">
      <div class="container">
        <div class="footer-content">
          <div><span class="footer-brand"><i class="fas fa-store me-1"></i> ShopPro</span><p class="footer-copy mt-2">&copy; 2026 ShopPro. All rights reserved.</p></div>
          <ul class="footer-links"><li><a th:href="@{/}">Trang chủ</a></li><li><a th:href="@{/products}">Sản phẩm</a></li><li><a th:href="@{/users}">Người dùng</a></li></ul>
        </div>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
