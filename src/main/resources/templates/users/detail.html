<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${user != null ? user.fullName : 'Chi tiết người dùng'}">Chi tiết</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-premium">
      <div class="container">
        <a class="navbar-brand" th:href="@{/}"><i class="fas fa-store"></i> ShopPro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="fas fa-home me-1"></i> Trang chủ</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/products}"><i class="fas fa-box me-1"></i> Sản phẩm</a></li>
            <li class="nav-item"><a class="nav-link active" th:href="@{/users}"><i class="fas fa-users me-1"></i> Người dùng</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="content-wrapper">
      <div class="container py-4">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb breadcrumb-premium">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item"><a th:href="@{/users}">Người dùng</a></li>
            <li class="breadcrumb-item active" th:text="${user.fullName}">Chi tiết</li>
          </ol>
        </nav>
        <div class="row justify-content-center animate-fade-in-up" th:if="${user != null}">
          <div class="col-md-6 col-lg-5">
            <div class="profile-card">
              <div class="profile-header"></div>
              <div class="profile-body">
                <div class="profile-avatar-wrapper">
                  <div class="avatar avatar-lg avatar-gradient mx-auto" style="border: 4px solid white; box-shadow: var(--shadow-lg);">
                    <span th:text="${#strings.toUpperCase(#strings.substring(user.fullName, 0, 1))}">A</span>
                  </div>
                </div>
                <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;" th:text="${user.fullName}">User Name</h2>
                <div class="profile-info-row">
                  <div class="info-icon id-icon"><i class="fas fa-hashtag"></i></div>
                  <div class="text-start">
                    <div class="info-label">ID</div>
                    <div class="info-value" th:text="${user.id}">1</div>
                  </div>
                </div>
                <div class="profile-info-row">
                  <div class="info-icon email-icon"><i class="fas fa-envelope"></i></div>
                  <div class="text-start">
                    <div class="info-label">Email</div>
                    <div class="info-value"><a th:href="'mailto:' + ${user.email}" th:text="${user.email}" style="color: var(--primary-500);">email</a></div>
                  </div>
                </div>
                <div class="divider"></div>
                <div class="d-flex justify-content-center gap-2">
                  <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn-premium btn-primary-premium"><i class="fas fa-pen"></i> Chỉnh sửa</a>
                  <a th:href="@{/users/delete/{id}(id=${user.id})}" class="btn-premium" style="background:var(--rose-500);color:white;" onclick="return confirm('Bạn có chắc muốn xóa người dùng này?');"><i class="fas fa-trash"></i> Xóa</a>
                  <a th:href="@{/users}" class="btn-premium btn-outline-premium"><i class="fas fa-arrow-left"></i> Quay lại</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <footer class="footer-premium">
      <div class="container">
        <div class="footer-content">
          <div><span class="footer-brand"><i class="fas fa-store me-1"></i> ShopPro</span><p class="footer-copy mt-2">&copy; 2026 ShopPro. All rights reserved.</p></div>
          <ul class="footer-links"><li><a th:href="@{/}">Trang chủ</a></li><li><a th:href="@{/products}">Sản phẩm</a></li><li><a th:href="@{/users}">Người dùng</a></li></ul>
        </div>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
