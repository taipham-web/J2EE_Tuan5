<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title
      th:text="${category.id != null ? 'Chỉnh sửa danh mục - ShopPro' : 'Thêm danh mục mới - ShopPro'}"
    >
      Form danh mục
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-premium">
      <div class="container">
        <a class="navbar-brand" th:href="@{/}">
          <i class="fas fa-store"></i> ShopPro
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/}"
                ><i class="fas fa-home me-1"></i> Trang chủ</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/products}"
                ><i class="fas fa-box me-1"></i> Sản phẩm</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active" th:href="@{/categories}"
                ><i class="fas fa-layer-group me-1"></i> Danh mục</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="content-wrapper">
      <div class="container py-4">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb breadcrumb-premium">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item">
              <a th:href="@{/categories}">Danh mục</a>
            </li>
            <li
              class="breadcrumb-item active"
              th:text="${category.id != null ? 'Chỉnh sửa' : 'Thêm mới'}"
            >
              Form
            </li>
          </ol>
        </nav>

        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="form-premium animate-fade-in-up">
              <div class="form-header">
                <h4>
                  <i
                    th:class="${category.id != null ? 'fas fa-pen-to-square' : 'fas fa-plus-circle'}"
                  ></i>
                  <span
                    th:text="${category.id != null ? 'Chỉnh sửa danh mục' : 'Thêm danh mục mới'}"
                    >Form</span
                  >
                </h4>
              </div>
              <div class="form-body">
                <form
                  th:action="${category.id != null ? '/categories/update/' + category.id : '/categories'}"
                  th:object="${category}"
                  method="post"
                  novalidate
                >
                  <div class="mb-4">
                    <label class="form-label">
                      <i
                        class="fas fa-tag me-1"
                        style="color: var(--primary-400)"
                      ></i>
                      Tên danh mục <span class="text-danger">*</span>
                    </label>
                    <input
                      type="text"
                      class="form-control"
                      th:field="*{name}"
                      th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                      placeholder="Nhập tên danh mục"
                    />
                    <div
                      class="invalid-feedback"
                      th:if="${#fields.hasErrors('name')}"
                      th:errors="*{name}"
                    >
                      Lỗi tên
                    </div>
                  </div>

                  <div class="divider"></div>

                  <div class="d-flex gap-2 justify-content-end">
                    <a
                      th:href="@{/categories}"
                      class="btn-premium btn-outline-premium"
                    >
                      <i class="fas fa-xmark"></i> Hủy
                    </a>
                    <button
                      type="submit"
                      class="btn-premium btn-primary-premium"
                    >
                      <i class="fas fa-floppy-disk"></i> Lưu danh mục
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer-premium">
      <div class="container">
        <div class="footer-content">
          <div>
            <span class="footer-brand"
              ><i class="fas fa-store me-1"></i> ShopPro</span
            >
            <p class="footer-copy mt-2">
              &copy; 2026 ShopPro. All rights reserved.
            </p>
          </div>
          <ul class="footer-links">
            <li><a th:href="@{/}">Trang chủ</a></li>
            <li><a th:href="@{/products}">Sản phẩm</a></li>
            <li><a th:href="@{/categories}">Danh mục</a></li>
          </ul>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
