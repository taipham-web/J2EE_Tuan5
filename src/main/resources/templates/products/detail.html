<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title
      th:text="${product != null ? product.name + ' - ShopPro' : 'Chi tiết sản phẩm - ShopPro'}"
    >
      Chi tiết sản phẩm
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-premium">
      <div class="container">
        <a class="navbar-brand" th:href="@{/}">
          <i class="fas fa-store"></i> ShopPro
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/}">
                <i class="fas fa-home me-1"></i> Trang chủ
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" th:href="@{/products}">
                <i class="fas fa-box me-1"></i> Sản phẩm
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/categories}">
                <i class="fas fa-layer-group me-1"></i> Danh mục
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="content-wrapper">
      <div class="container py-4">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb breadcrumb-premium">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item">
              <a th:href="@{/products}">Sản phẩm</a>
            </li>
            <li class="breadcrumb-item active" th:text="${product.name}">
              Chi tiết
            </li>
          </ol>
        </nav>

        <div class="detail-card animate-fade-in-up" th:if="${product != null}">
          <div class="row g-0">
            <div class="col-md-5">
              <div class="detail-image" style="margin: 1.5rem">
                <img
                  th:src="${product.image != null ? product.image : 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600&h=500&fit=crop'}"
                  th:alt="${product.name}"
                />
              </div>
            </div>
            <div class="col-md-7">
              <div style="padding: 2rem 2rem 2rem 0.5rem">
                <span
                  class="badge-premium badge-category mb-3"
                  th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}"
                  >Category</span
                >

                <h1
                  style="font-size: 1.75rem; margin-bottom: 0.5rem"
                  th:text="${product.name}"
                >
                  Product Name
                </h1>

                <div class="detail-info-card">
                  <div class="info-label">
                    <i class="fas fa-image me-1"></i> Hình ảnh
                  </div>
                  <div
                    class="info-content"
                    th:text="${product.image != null ? product.image : 'Chưa có hình ảnh'}"
                  >
                    Image
                  </div>
                </div>

                <div style="margin-bottom: 1.5rem">
                  <span
                    style="
                      font-size: 0.75rem;
                      text-transform: uppercase;
                      letter-spacing: 0.05em;
                      color: var(--neutral-400);
                      font-weight: 600;
                    "
                    >Giá bán</span
                  >
                  <h2
                    class="price-tag"
                    style="font-size: 2rem; margin-top: 0.25rem"
                    th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}"
                  >
                    Price
                  </h2>
                </div>

                <div class="divider"></div>

                <div class="d-flex gap-2 flex-wrap">
                  <a
                    th:href="@{/products/edit/{id}(id=${product.id})}"
                    class="btn-premium btn-primary-premium"
                    id="btn-edit"
                  >
                    <i class="fas fa-pen"></i> Chỉnh sửa
                  </a>
                  <a
                    th:href="@{/products/delete/{id}(id=${product.id})}"
                    class="btn-premium"
                    style="background: var(--rose-500); color: white"
                    onclick="
                      return confirm('Bạn có chắc muốn xóa sản phẩm này?');
                    "
                    id="btn-delete"
                  >
                    <i class="fas fa-trash"></i> Xóa
                  </a>
                  <a
                    th:href="@{/products}"
                    class="btn-premium btn-outline-premium"
                    id="btn-back"
                  >
                    <i class="fas fa-arrow-left"></i> Quay lại
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer-premium">
      <div class="container">
        <div class="footer-content">
          <div>
            <span class="footer-brand"
              ><i class="fas fa-store me-1"></i> ShopPro</span
            >
            <p class="footer-copy mt-2">
              &copy; 2026 ShopPro. All rights reserved.
            </p>
          </div>
          <ul class="footer-links">
            <li><a th:href="@{/}">Trang chủ</a></li>
            <li><a th:href="@{/products}">Sản phẩm</a></li>
            <li><a th:href="@{/users}">Người dùng</a></li>
          </ul>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
