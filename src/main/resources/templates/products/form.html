<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${product.id != null ? 'Chỉnh sửa sản phẩm - ShopPro' : 'Thêm sản phẩm mới - ShopPro'}">
      Form sản phẩm
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-premium">
      <div class="container">
        <a class="navbar-brand" th:href="@{/}">
          <i class="fas fa-store"></i> ShopPro
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/}">
                <i class="fas fa-home me-1"></i> Trang chủ
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" th:href="@{/products}">
                <i class="fas fa-box me-1"></i> Sản phẩm
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/users}">
                <i class="fas fa-users me-1"></i> Người dùng
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="content-wrapper">
      <div class="container py-4">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb breadcrumb-premium">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item"><a th:href="@{/products}">Sản phẩm</a></li>
            <li class="breadcrumb-item active" th:text="${product.id != null ? 'Chỉnh sửa' : 'Thêm mới'}">Form</li>
          </ol>
        </nav>

        <div class="row justify-content-center animate-fade-in-up">
          <div class="col-md-8 col-lg-7">
            <div class="form-premium">
              <div class="form-header">
                <h4>
                  <i th:class="${product.id != null ? 'fas fa-pen-to-square' : 'fas fa-plus-circle'}"></i>
                  <span th:text="${product.id != null ? 'Chỉnh sửa sản phẩm' : 'Thêm sản phẩm mới'}">Form</span>
                </h4>
              </div>
              <div class="form-body">
                <form
                  th:action="${product.id != null ? '/products/update/' + product.id : '/products'}"
                  th:object="${product}"
                  method="post"
                  novalidate
                >
                  <div class="mb-3">
                    <label class="form-label">
                      <i class="fas fa-cube me-1" style="color: var(--primary-400);"></i> Tên sản phẩm <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control" th:field="*{name}" 
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                           placeholder="Nhập tên sản phẩm" id="input-name" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Lỗi tên</div>
                  </div>

                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label class="form-label">
                        <i class="fas fa-coins me-1" style="color: var(--amber-500);"></i> Giá (VNĐ) <span class="text-danger">*</span>
                      </label>
                      <input type="number" class="form-control" th:field="*{price}" 
                             th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''"
                             min="1" max="9999999" placeholder="0" id="input-price" />
                      <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Lỗi giá</div>
                    </div>
                    <div class="col-md-6 mb-3">
                      <label class="form-label">
                        <i class="fas fa-award me-1" style="color: var(--accent-500);"></i> Thương hiệu
                      </label>
                      <input type="text" class="form-control" th:field="*{brand}" placeholder="Nhập thương hiệu" id="input-brand" />
                    </div>
                  </div>

                  <div class="mb-3">
                    <label class="form-label">
                      <i class="fas fa-layer-group me-1" style="color: var(--primary-400);"></i> Danh mục
                    </label>
                    <select class="form-control form-select" th:field="*{categoryName}" id="input-category">
                      <option value="">-- Chọn danh mục --</option>
                      <option th:each="cat : ${categories}" 
                              th:value="${cat.name}" 
                              th:text="${cat.name}"
                              th:selected="${product.categoryName != null && product.categoryName == cat.name}">
                      </option>
                    </select>
                  </div>

                  <div class="mb-3">
                    <label class="form-label">
                      <i class="fas fa-image me-1" style="color: var(--rose-400);"></i> URL Hình ảnh
                    </label>
                    <input type="url" class="form-control" th:field="*{imageUrl}" placeholder="https://example.com/image.jpg" id="input-image" />
                  </div>

                  <div class="mb-3">
                    <label class="form-label">
                      <i class="fas fa-align-left me-1" style="color: var(--primary-400);"></i> Mô tả ngắn
                    </label>
                    <input type="text" class="form-control" th:field="*{shortDescription}" placeholder="Mô tả ngắn gọn về sản phẩm" id="input-short-desc" />
                  </div>

                  <div class="mb-4">
                    <label class="form-label">
                      <i class="fas fa-file-lines me-1" style="color: var(--primary-400);"></i> Mô tả chi tiết
                    </label>
                    <textarea class="form-control" th:field="*{description}" rows="4" placeholder="Mô tả chi tiết về sản phẩm..." id="input-description"></textarea>
                  </div>

                  <div class="divider"></div>

                  <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/products}" class="btn-premium btn-outline-premium" id="btn-cancel">
                      <i class="fas fa-xmark"></i> Hủy
                    </a>
                    <button type="submit" class="btn-premium btn-primary-premium" id="btn-save">
                      <i class="fas fa-floppy-disk"></i> Lưu sản phẩm
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer-premium">
      <div class="container">
        <div class="footer-content">
          <div>
            <span class="footer-brand"><i class="fas fa-store me-1"></i> ShopPro</span>
            <p class="footer-copy mt-2">&copy; 2026 ShopPro. All rights reserved.</p>
          </div>
          <ul class="footer-links">
            <li><a th:href="@{/}">Trang chủ</a></li>
            <li><a th:href="@{/products}">Sản phẩm</a></li>
            <li><a th:href="@{/users}">Người dùng</a></li>
          </ul>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
